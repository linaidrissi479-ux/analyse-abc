<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Schneider - Digitalisation Inventaire</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --g:#009639; --bg:#f4f7f4; --s:#fff; --b:#d1d8d1; --t:#1a1f1a; }
        body { font-family: sans-serif; background:var(--bg); margin:0; padding:20px; }
        .header { background: var(--g); color: white; padding: 20px; border-radius: 8px 8px 0 0; }
        .tabs { display: flex; background: #fff; border: 1px solid var(--b); border-top:none; }
        .tab { flex:1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #888; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--g); border-bottom: 3px solid var(--g); background: #f9fbf9; }
        .card { background: var(--s); border: 1px solid var(--b); border-top:none; padding: 25px; border-radius: 0 0 8px 8px; }
        .stats-grid { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card { flex: 1; padding: 20px; border-radius: 8px; border: 1px solid var(--b); text-align: center; background: white; }
        .quota-val { font-size: 28px; font-weight: bold; color: #c0392b; display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8faf8; padding: 12px; text-align: left; border-bottom: 2px solid var(--b); }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--g); color: white; }
        .tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .tag-A { background: #fdeaea; color: #e74c3c; }
        .tag-B { background: #fef9e7; color: #f1c40f; }
        .tag-C { background: #eafaf1; color: #2ecc71; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">Digitalisation Rapport Inventaire Schneider / AGL</h2>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('tab1')">1. ANALYSE ABC (80/15/5)</div>
    <div class="tab" onclick="switchTab('tab2')">2. PLANIFICATION MENSUELLE</div>
</div>

<div id="tab1" class="card">
    <button class="btn btn-main" onclick="document.getElementById('csv').click()">📁 Charger l'extraction CSV</button>
    <input type="file" id="csv" accept=".csv" style="display:none">
    
    <div id="res1" style="display:none">
        <table>
            <thead>
                <tr>
                    <th>Article</th>
                    <th>Volume</th>
                    <th>Cumul %</th>
                    <th>Classe</th>
                </tr>
            </thead>
            <tbody id="bodyABC"></tbody>
        </table>
    </div>
</div>

<div id="tab2" class="card" style="display:none">
    <h3>Nombre d'articles à choisir ce mois-ci</h3>
    <div class="stats-grid">
        <div class="stat-card"><b>CLASSE A</b><span class="quota-val" id="qA">0</span><small>soit 33% du stock A</small></div>
        <div class="stat-card"><b>CLASSE B</b><span class="quota-val" id="qB" style="color:#f1c40f">0</span><small>soit 16% du stock B</small></div>
        <div class="stat-card"><b>CLASSE C</b><span class="quota-val" id="qC" style="color:#2ecc71">0</span><small>soit 8% du stock C</small></div>
    </div>
    <hr>
    <button class="btn" style="background:#333; color:white" onclick="exportExcel()">📥 Télécharger la liste Excel</button>
    <table>
        <thead>
            <tr>
                <th>Priorité</th>
                <th>Article</th>
                <th>Classe</th>
                <th>Instruction</th>
            </tr>
        </thead>
        <tbody id="bodyPlan"></tbody>
    </table>
</div>

<script>
let finalInventory = [];

function switchTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.getElementById('tab1').style.display = (id === 'tab1' ? 'block' : 'none');
    document.getElementById('tab2').style.display = (id === 'tab2' ? 'block' : 'none');
}

document.getElementById('csv').onchange = e => {
    Papa.parse(e.target.files[0], {
        header: true, skipEmptyLines: true,
        complete: function(r) { processData(r.data, r.meta.fields); }
    });
};

function processData(data, fields) {
    const artCol = fields.find(f => /art|item|ref/i.test(f));
    const qtyCol = fields.find(f => /qty|stock|hand|quant/i.test(f));
    
    let stats = {};
    data.forEach(row => {
        let a = String(row[artCol] || '').trim().toUpperCase();
        let q = parseFloat(String(row[qtyCol] || '0').replace(/\s/g,'').replace(',','.')) || 0;
        if(a) stats[a] = (stats[a] || 0) + q;
    });

    let sorted = Object.entries(stats).sort((a,b) => b[1] - a[1]);
    let totVol = sorted.reduce((s,x) => s + x[1], 0);
    let cum = 0;
    let counts = {A:0, B:0, C:0};
    finalInventory = [];

    sorted.forEach(([ref, q]) => {
        cum += q;
        let p = (cum/totVol)*100;
        let cl = p <= 80.0001 ? 'A' : (p <= 95.0001 ? 'B' : 'C');
        counts[cl]++;
        finalInventory.push({ 
            Article: ref, 
            Volume: Math.round(q), 
            Cumul: p.toFixed(2) + '%', 
            Classe: cl 
        });
    });

    // Affichage Onglet 1
    document.getElementById('res1').style.display = 'block';
    document.getElementById('bodyABC').innerHTML = finalInventory.map(i => `
        <tr><td>${i.Article}</td><td>${i.Volume}</td><td>${i.Cumul}</td><td><span class="tag tag-${i.Classe}">${i.Classe}</span></td></tr>
    `).join('');

    // Quotas Onglet 2
    document.getElementById('qA').innerText = Math.ceil(counts.A * 0.33);
    document.getElementById('qB').innerText = Math.ceil(counts.B * 0.16);
    document.getElementById('qC').innerText = Math.ceil(counts.C * 0.08);

    // Liste Onglet 2
    document.getElementById('bodyPlan').innerHTML = finalInventory.map((i, index) => `
        <tr><td>${index + 1}</td><td>${i.Article}</td><td><span class="tag tag-${i.Classe}">${i.Classe}</span></td><td>Prendre les X premiers de chaque classe</td></tr>
    `).join('');
}

function exportExcel() {
    const ws = XLSX.utils.json_to_sheet(finalInventory);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Plan_Inventaire");
    XLSX.writeFile(wb, "Inventaire_Schneider_Digital.xlsx");
}
</script>
</body>
</html>
