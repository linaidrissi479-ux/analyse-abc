<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Inventaire ABC</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8}
.tabs{display:flex;background:#009639}
.tab{
  padding:15px 25px;
  cursor:pointer;
  color:white;
  font-weight:bold;
}
.tab.active{background:#007a2f}
.page{display:none;padding:20px}
.page.active{display:block}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">Inventaire</div>
  <div class="tab" onclick="showTab(1)">Analyse ABC</div>
</div>

<!-- ONGLET 1 -->
<div class="page active">
<!-- COLLE ICI TON DERNIER HTML INVENTAIRE (SANS <html> <head> <body>) -->
<div id="inventaireApp">
    <!-- 🔴 TU COLLES TON DERNIER HTML ICI -->
</div>
</div>

<!-- ONGLET 2 -->
<div class="page">
<!-- COLLE ICI TON HTML ABC -->
<div id="abcApp">
    <!-- 🔴 TU COLLES TON HTML ABC ICI -->
</div>
</div>

<script>
function showTab(index){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', i===index);
  });

  document.querySelectorAll('.page').forEach((p,i)=>{
    p.classList.toggle('active', i===index);
  });
}
</script>

</body>
</html>
