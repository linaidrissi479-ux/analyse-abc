<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Schneider Electric - Analyseur ABC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --schneider-green: #009639; --bg-gray: #f4f4f4; --border: #d1d1d1; }
        body { font-family: Arial, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; color: #333; }
        .header { background-color: var(--schneider-green); color: white; padding: 15px; margin-bottom: 20px; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
        .tab { padding: 10px 20px; cursor: pointer; background: #eee; border: 1px solid var(--border); border-bottom: none; margin-right: 5px; font-weight: bold; }
        .tab.active { background: white; border-top: 3px solid var(--schneider-green); color: var(--schneider-green); }
        .card { background: white; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .config-bar { background: #e9f5ed; padding: 15px; border: 1px solid var(--schneider-green); display: flex; gap: 15px; align-items: flex-end; }
        .stats-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { flex: 1; padding: 15px; border: 1px solid var(--border); text-align: center; background: white; }
        .quota-num { font-size: 24px; font-weight: bold; color: #d9534f; display: block; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        button { padding: 10px 15px; background-color: var(--schneider-green); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #007a2f; }
        .tag-A { color: #d9534f; font-weight: bold; }
        .tag-B { color: #f0ad4e; font-weight: bold; }
        .tag-C { color: #5cb85c; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">Système de Pilotage Inventaire</h2>
</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('tab1')">ANALYSE ABC</div>
    <div class="tab" onclick="showTab('tab2')">PLAN DE COMPTAGE</div>
</div>

<div id="tab1" class="tab-content">
    <div class="card">
        <label>Importer fichier CSV : </label>
        <input type="file" id="csvFile" accept=".csv">
        
        <div id="columnSelection" style="display:none; margin-top:20px;">
            <div class="config-bar">
                <div>
                    <label>Colonne Article</label><br>
                    <select id="selectArticle"></select>
                </div>
                <div>
                    <label>Colonne Quantité</label><br>
                    <select id="selectQty"></select>
                </div>
                <button onclick="calculateABC()">Lancer le Calcul</button>
            </div>
        </div>
    </div>

    <div id="resultsCard" class="card" style="display:none">
        <table id="abcTable">
            <thead>
                <tr>
                    <th>Article</th>
                    <th>Volume Total</th>
                    <th>Cumul</th>
                    <th>% Cumulé</th>
                    <th>Classe</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="tab2" class="tab-content" style="display:none">
    <div class="card">
        <div class="stats-container">
            <div class="stat-box">Classe A (33%) <span id="qA" class="quota-num">0</span></div>
            <div class="stat-box">Classe B (16%) <span id="qB" class="quota-num" style="color:#f0ad4e">0</span></div>
            <div class="stat-box">Classe C (8%) <span id="qC" class="quota-num" style="color:#5cb85c">0</span></div>
        </div>
        <button onclick="downloadXLSX()" style="background:#333">Exporter vers Excel</button>
    </div>
</div>

<script>
    let rawData = [];
    let processedResults = [];

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    document.getElementById('csvFile').onchange = function(e) {
        // Reset des données précédentes
        rawData = [];
        processedResults = [];
        document.getElementById('resultsCard').style.display = 'none';
        
        Papa.parse(e.target.files[0], {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                rawData = results.data;
                const fields = results.meta.fields;
                const selA = document.getElementById('selectArticle');
                const selQ = document.getElementById('selectQty');
                selA.innerHTML = ''; selQ.innerHTML = '';
                fields.forEach(f => {
                    selA.add(new Option(f, f));
                    selQ.add(new Option(f, f));
                });
                document.getElementById('columnSelection').style.display = 'block';
            }
        });
    };

    function calculateABC() {
        const artCol = document.getElementById('selectArticle').value;
        const qtyCol = document.getElementById('selectQty').value;
        
        let aggregation = {};
        rawData.forEach(row => {
            let ref = row[artCol] ? row[artCol].trim() : '';
            let val = parseFloat(String(row[qtyCol]).replace(/\s/g, '').replace(',', '.')) || 0;
            if(ref) aggregation[ref] = (aggregation[ref] || 0) + val;
        });

        let sorted = Object.entries(aggregation).sort((a, b) => b[1] - a[1]);
        let totalVolume = sorted.reduce((sum, item) => sum + item[1], 0);
        
        let cumulative = 0;
        let counts = { A: 0, B: 0, C: 0 };
        processedResults = [];

        sorted.forEach(([item, volume]) => {
            cumulative += volume;
            let percent = (cumulative / totalVolume) * 100;
            let cls = percent <= 80.0001 ? 'A' : (percent <= 95.0001 ? 'B' : 'C');
            counts[cls]++;
            processedResults.push({ item, volume, cumulative, percent: percent.toFixed(2), cls });
        });

        // Rendu Tableau
        const tbody = document.querySelector('#abcTable tbody');
        tbody.innerHTML = processedResults.map(r => `
            <tr>
                <td>${r.item}</td>
                <td>${r.volume}</td>
                <td>${r.cumulative}</td>
                <td>${r.percent}%</td>
                <td class="tag-${r.cls}">${r.cls}</td>
            </tr>
        `).join('');
        document.getElementById('resultsCard').style.display = 'block';

        // Mise à jour Quotas
        document.getElementById('qA').innerText = Math.ceil(counts.A * 0.33);
        document.getElementById('qB').innerText = Math.ceil(counts.B * 0.16);
        document.getElementById('qC').innerText = Math.ceil(counts.C * 0.08);
    }

    function downloadXLSX() {
        const ws = XLSX.utils.json_to_sheet(processedResults);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Analyse_ABC");
        XLSX.writeFile(wb, "Rapport_ABC_Schneider.xlsx");
    }
</script>

</body>
</html>
