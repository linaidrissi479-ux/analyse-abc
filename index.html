function clean(v){
  return String(v ?? &#x27;&#x27;).replace(/^\uFEFF/,&#x27;&#x27;).replace(/\u00A0/g,&#x27; &#x27;).trim();
}

function norm(v){
  return clean(v)
    .toLowerCase()
    .normalize(&#x27;NFD&#x27;)
    .replace(/[\u0300-\u036f]/g,&#x27;&#x27;)
    .replace(/[^a-z0-9]/g,&#x27;&#x27;);
}

function num(v){
  if(v === null || v === undefined || v === &#x27;&#x27;) return 0;
  if(typeof v === &#x27;number&#x27;) return v;

  let s = String(v)
    .replace(/\u00A0/g,&#x27;&#x27;)
    .replace(/\s/g,&#x27;&#x27;)
    .trim();

  if(s.includes(&#x27;,&#x27;) &amp;&amp; s.includes(&#x27;.&#x27;)){
    s = s.replace(/\./g,&#x27;&#x27;).replace(&#x27;,&#x27;,&#x27;.&#x27;);
  } else {
    s = s.replace(&#x27;,&#x27;,&#x27;.&#x27;);
  }

  const n = Number(s);
  return isNaN(n) ? 0 : n;
}

function fmt(n){
  return Number(n || 0).toLocaleString(&#x27;fr-FR&#x27;, {maximumFractionDigits:2});
}

function esc(v){
  return String(v ?? &#x27;&#x27;)
    .replace(/&amp;/g,&#x27;&amp;amp;&#x27;)
    .replace(/&lt;/g,&#x27;&amp;lt;&#x27;)
    .replace(/&gt;/g,&#x27;&amp;gt;&#x27;)
    .replace(/&quot;/g,&#x27;&amp;quot;&#x27;);
}

function detectDelimiter(text){
  const first = text.split(/\r?\n/).find(l=&gt;l.trim()) || &#x27;&#x27;;
  const candidates = [&#x27;;&#x27;,&#x27;\t&#x27;,&#x27;,&#x27;,&#x27;|&#x27;];
  let best = &#x27;;&#x27;;
  let bestCount = -1;

  candidates.forEach(d=&gt;{
    const count = first.split(d).length;
    if(count &gt; bestCount){
      bestCount = count;
      best = d;
    }
  });

  return best;
}

function loadAnyFile(file, callback){
  if(!file) return;

  const ext = file.name.split(&#x27;.&#x27;).pop().toLowerCase();

  if(ext === &#x27;csv&#x27;){
    const reader = new FileReader();

    reader.onload = evt=&gt;{
      const content = evt.target.result;
      const delimiter = detectDelimiter(content);

      Papa.parse(content, {
        header:true,
        skipEmptyLines:true,
        delimiter,
        transformHeader:h=&gt;clean(h),
        complete:r=&gt;callback({CSV:r.data}, [&#x27;CSV&#x27;])
      });
    };

    reader.readAsText(file, &#x27;utf-8&#x27;);
  } else {
    const reader = new FileReader();

    reader.onload = evt=&gt;{
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, {type:&#x27;array&#x27;, cellDates:true});
      const output = {};

      wb.SheetNames.forEach(name=&gt;{
        output[name] = XLSX.utils.sheet_to_json(wb.Sheets[name], {
          defval:&#x27;&#x27;,
          raw:true
        }).map(row=&gt;{
          const obj = {};
          Object.keys(row).forEach(k=&gt;{
            obj[clean(k)] = row[k];
          });
          return obj;
        });
      });

      callback(output, wb.SheetNames);
    };

    reader.readAsArrayBuffer(file);
  }
}

function fillSelect(select, fields, withBlank=false){
  select.innerHTML = &#x27;&#x27;;
  if(withBlank) select.add(new Option(&#x27;-- Aucun --&#x27;,&#x27;&#x27;));
  fields.forEach(f=&gt;select.add(new Option(f,f)));
}

function autoSelect(select, candidates){
  const opts = Array.from(select.options);

  for(const c of candidates){
    const found = opts.find(o=&gt;norm(o.value) === norm(c));
    if(found){
      select.value = found.value;
      return;
    }
  }

  for(const c of candidates){
    const found = opts.find(o=&gt;norm(o.value).includes(norm(c)));
    if(found){
      select.value = found.value;
      return;
    }
  }
}

function setupSheetSelect(select, names, onChange, preferLast=false){
  fillSelect(select, names);

  select.onchange = ()=&gt;onChange(select.value);

  const itSheets = names.filter(n=&gt;/^I-T/i.test(n));
  const defaultSheet = preferLast &amp;&amp; itSheets.length
    ? itSheets[itSheets.length - 1]
    : names[0];

  select.value = defaultSheet;
  onChange(defaultSheet);
}

els.stockFile.addEventListener(&#x27;change&#x27;, e=&gt;{
  loadAnyFile(e.target.files[0], (wb,names)=&gt;{
    stockWorkbook = wb;
    els.stockControls.classList.remove(&#x27;hidden&#x27;);
    setupSheetSelect(els.stockSheet, names, loadStockSheet);
  });
});

function loadStockSheet(name){
  stockRows = stockWorkbook[name] || [];

  const fields = Object.keys(stockRows[0] || {});

  fillSelect(els.stockLocation, fields);
  fillSelect(els.stockItem, fields);
  fillSelect(els.stockClass, fields);
  fillSelect(els.stockQty, fields);

  autoSelect(els.stockLocation, [&#x27;CURRENT LOCATION&#x27;,&#x27;Current Location&#x27;,&#x27;Location&#x27;,&#x27;Emplacement&#x27;]);
  autoSelect(els.stockItem, [&#x27;ITEM CODE&#x27;,&#x27;Item Code&#x27;,&#x27;Item&#x27;,&#x27;Article&#x27;,&#x27;ARTICLE&#x27;]);
  autoSelect(els.stockClass, [&#x27;VELOCITY CLASS&#x27;,&#x27;Velocity Class&#x27;,&#x27;Classe&#x27;,&#x27;ABC&#x27;]);
  autoSelect(els.stockQty, [&#x27;STOCK ON HAND&#x27;,&#x27;Stock on Hand&#x27;,&#x27;Stock&#x27;]);

  els.stockInfo.innerHTML = `Fichier stock chargé : &lt;b&gt;${name}&lt;/b&gt; — ${stockRows.length} lignes.`;
}

els.historyFile.addEventListener(&#x27;change&#x27;, e=&gt;{
  loadAnyFile(e.target.files[0], (wb,names)=&gt;{
    historyWorkbook = wb;
    historySheetNames = names;
    els.historyControls.classList.remove(&#x27;hidden&#x27;);
    setupSheetSelect(els.historySheet, names, loadHistorySheet, true);
    buildHistory();
  });
});

function loadHistorySheet(name){
  historyRows = historyWorkbook[name] || [];

  const fields = Object.keys(historyRows[0] || {});

  fillSelect(els.historyItem, fields);
  fillSelect(els.historyCount, fields, true);

  autoSelect(els.historyItem, [&#x27;Item&#x27;,&#x27;ITEM CODE&#x27;,&#x27;Item Code&#x27;,&#x27;Article&#x27;,&#x27;ARTICLE&#x27;]);
  autoSelect(els.historyCount, [&#x27;Nbr de fois inventoriée&#x27;,&#x27;Nbr de fois inventoriee&#x27;,&#x27;Nbr fois inventoriée&#x27;,&#x27;Nbr fois inventoriee&#x27;,&#x27;Nombre de fois inventoriée&#x27;]);

  latestMonthName = name;
  els.historyInfo.innerHTML = `Onglet dernier mois à éviter : &lt;b&gt;${name}&lt;/b&gt; — ${historyRows.length} lignes.`;
}

els.historySheet.addEventListener(&#x27;change&#x27;, ()=&gt;{
  loadHistorySheet(els.historySheet.value);
  buildHistory();
});

els.historyItem.addEventListener(&#x27;change&#x27;, buildHistory);
els.historyCount.addEventListener(&#x27;change&#x27;, buildHistory);

function findItemField(rows){
  const fields = Object.keys(rows[0] || {});

  // Priorité à la colonne choisie par l&#x27;utilisateur
  if(els.historyItem &amp;&amp; els.historyItem.value){
    return els.historyItem.value;
  }

  return fields.find(f=&gt;norm(f) === &#x27;item&#x27;) ||
         fields.find(f=&gt;norm(f) === &#x27;itemcode&#x27;) ||
         fields.find(f=&gt;norm(f) === &#x27;article&#x27;) ||
         fields.find(f=&gt;norm(f).includes(&#x27;itemcode&#x27;)) ||
         fields.find(f=&gt;norm(f).includes(&#x27;item&#x27;)) ||
         fields.find(f=&gt;norm(f).includes(&#x27;article&#x27;)) ||
         fields.find(f=&gt;norm(f).includes(&#x27;reference&#x27;)) ||
         fields[0];
}

function findCountField(rows){
  const fields = Object.keys(rows[0] || {});

  // Priorité à la colonne choisie par l&#x27;utilisateur
  if(els.historyCount &amp;&amp; els.historyCount.value){
    return els.historyCount.value;
  }

  return fields.find(f=&gt;norm(f).includes(&#x27;nbrdefoisinventoriee&#x27;)) ||
         fields.find(f=&gt;norm(f).includes(&#x27;nbrfois&#x27;)) ||
         fields.find(f=&gt;norm(f).includes(&#x27;nombredefois&#x27;)) ||
         fields.find(f=&gt;norm(f).includes(&#x27;fois&#x27;)) ||
         fields.find(f=&gt;norm(f).includes(&#x27;count&#x27;)) ||
         &#x27;&#x27;;
}

function buildHistory(){
  historyCountByItem = {};
  latestMonthItems = new Set();

  if(!historySheetNames.length) return;

  const itSheets = historySheetNames.filter(n=&gt;/^I-T/i.test(n));
  const sheetsToRead = itSheets.length ? itSheets : historySheetNames;
  const selectedLatestSheet = els.historySheet.value || sheetsToRead[sheetsToRead.length - 1];

  sheetsToRead.forEach(sheetName=&gt;{
    const rows = historyWorkbook[sheetName] || [];
    if(!rows.length) return;

    const itemField = findItemField(rows);
    const countField = findCountField(rows);
    const seen = new Set();

    rows.forEach(row=&gt;{
      const rawItem = row[itemField];
      const item = clean(rawItem);

      if(!item) return;

      const key = norm(item);

      if(!key || key === &#x27;item&#x27; || key === &#x27;itemcode&#x27; || key === &#x27;article&#x27;){
        return;
      }

      seen.add(key);

      // Si une colonne nombre de fois existe, on l&#x27;utilise.
      if(countField){
        const countValue = num(row[countField]);
        if(countValue &gt; 0){
          historyCountByItem[key] = Math.max(historyCountByItem[key] || 0, countValue);
        }
      }
    });

    // Si aucune colonne &quot;Nbr de fois&quot; n&#x27;existe, on compte 1 fois par onglet où l&#x27;article apparaît.
    if(!countField){
      seen.forEach(key=&gt;{
        historyCountByItem[key] = (historyCountByItem[key] || 0) + 1;
      });
    } else {
      seen.forEach(key=&gt;{
        historyCountByItem[key] = Math.max(historyCountByItem[key] || 0, 0);
      });
    }

    // L&#x27;onglet sélectionné est celui à éviter pour le prochain mois.
    if(sheetName === selectedLatestSheet){
      latestMonthItems = seen;
    }
  });

  latestMonthName = selectedLatestSheet;

  els.historyInfo.innerHTML =
    `Historique lu : &lt;b&gt;${sheetsToRead.length}&lt;/b&gt; onglet(s). ` +
    `Onglet évité : &lt;b&gt;${latestMonthName}&lt;/b&gt;. ` +
    `Articles détectés dans cet onglet : &lt;b&gt;${latestMonthItems.size}&lt;/b&gt;. ` +
    `Colonne item utilisée : &lt;b&gt;${els.historyItem.value || &#x27;auto&#x27;}&lt;/b&gt;.`;
}

function classLabel(v){
  const c = clean(v).toUpperCase();
  return [&#x27;A&#x27;,&#x27;B&#x27;,&#x27;C&#x27;].includes(c) ? c : &#x27;&#x27;;
}

function annualObjective(cls){
  if(cls === &#x27;A&#x27;) return 4;
  if(cls === &#x27;B&#x27;) return 2;
  return 1;
}

function targetRate(cls){
  if(cls === &#x27;A&#x27;) return 0.33;
  if(cls === &#x27;B&#x27;) return 0.16;
  return 0.08;
}

function classOrder(cls){
  return {A:1,B:2,C:3}[cls] || 99;
}

function sortRows(rows){
  return [...rows].sort((a,b)=&gt;{
    const byClass = classOrder(a.cls) - classOrder(b.cls);
    if(byClass !== 0) return byClass;

    const byItem = String(a.item).localeCompare(String(b.item));
    if(byItem !== 0) return byItem;

    return String(a.location).localeCompare(String(b.location));
  });
}

function pickByQuota(items, cls){
  const list = items
    .filter(x=&gt;x.cls === cls)
    .sort((a,b)=&gt;{
      // 1. éviter le dernier mois
      if(a.wasLatest !== b.wasLatest) return a.wasLatest ? 1 : -1;

      // 2. prendre ceux qui ont été le moins inventoriés
      if(a.historyCount !== b.historyCount) return a.historyCount - b.historyCount;

      // 3. ordre stable par item
      return String(a.item).localeCompare(String(b.item));
    });

  const rate = targetRate(cls);
  const qty = Math.ceil(list.length * rate);

  return {
    total:list.length,
    target:qty,
    selected:list.slice(0, qty)
  };
}

function generateInventory(){
  if(!stockRows.length){
    alert(&#x27;Importe d’abord le fichier stock.&#x27;);
    return;
  }

  if(historySheetNames.length){
    buildHistory();
  }

  const locCol = els.stockLocation.value;
  const itemCol = els.stockItem.value;
  const clsCol = els.stockClass.value;
  const qtyCol = els.stockQty.value;

  const stockByItem = {};

  stockRows.forEach((row, originalIndex)=&gt;{
    const item = clean(row[itemCol]);
    const cls = classLabel(row[clsCol]);

    if(!item || !cls) return;

    const key = norm(item);
    const location = clean(row[locCol]);
    const stock = num(row[qtyCol]);

    if(!stockByItem[key]){
      stockByItem[key] = {
        key,
        item,
        cls,
        rows:[],
        locations:new Set(),
        historyCount:historyCountByItem[key] || 0,
        wasLatest:latestMonthItems.has(key),
        selected:false
      };
    }

    // Si un même item apparaît plusieurs fois avec des classes différentes,
    // on garde la classe la plus prioritaire : A &gt; B &gt; C.
    if(classOrder(cls) &lt; classOrder(stockByItem[key].cls)){
      stockByItem[key].cls = cls;
    }

    if(location) stockByItem[key].locations.add(location);

    stockByItem[key].rows.push({
      originalIndex,
      key,
      location,
      item,
      stock,
      stockPhysique:stock,
      ecart:0,
      comment:&#x27;&#x27;,
      cls
    });
  });

  const uniqueItems = Object.values(stockByItem);

  // Réinitialisation
  uniqueItems.forEach(item=&gt;{
    item.selected = false;
  });

  const quotaA = pickByQuota(uniqueItems, &#x27;A&#x27;);
  const quotaB = pickByQuota(uniqueItems, &#x27;B&#x27;);
  const quotaC = pickByQuota(uniqueItems, &#x27;C&#x27;);

  quotaA.selected.forEach(item=&gt;item.selected = true);
  quotaB.selected.forEach(item=&gt;item.selected = true);
  quotaC.selected.forEach(item=&gt;item.selected = true);

  const targets = {
    A:quotaA.target,
    B:quotaB.target,
    C:quotaC.target
  };

  allRows = [];
  selectedRows = [];
  selectedItemKeys = new Set();

  uniqueItems.forEach(item=&gt;{
    const nbrLocation = item.locations.size || item.rows.length || 1;
    const nbrAfter = item.selected ? item.historyCount + 1 : item.historyCount;

    // Tableau du haut : tout le stock, donc tous les emplacements
    item.rows.forEach(row=&gt;{
      const finalRow = {
        ...row,
        cls:item.cls,
        selected:item.selected,
        nbrLocation,
        nbrBefore:item.historyCount,
        nbrAfter,
        wasLatest:item.wasLatest
      };

      allRows.push(finalRow);
    });

    // Tableau du bas : 1 seule ligne par article sélectionné
    // Comme ça le nombre de lignes = exactement A + B + C.
    if(item.selected){
      const firstRow = item.rows[0];

      selectedRows.push({
        ...firstRow,
        cls:item.cls,
        selected:true,
        nbrLocation,
        nbrBefore:item.historyCount,
        nbrAfter,
        wasLatest:item.wasLatest
      });

      selectedItemKeys.add(item.key);
    }
  });
  renderAll(uniqueItems.length, targets);

  els.extraInfo.innerHTML =
    `Quotas appliqués sur articles uniques : ` +
    `A=${quotaA.target}/${quotaA.total} (${Math.round(quotaA.target/quotaA.total*100 || 0)}%), ` +
    `B=${quotaB.target}/${quotaB.total} (${Math.round(quotaB.target/quotaB.total*100 || 0)}%), ` +
    `C=${quotaC.target}/${quotaC.total} (${Math.round(quotaC.target/quotaC.total*100 || 0)}%). ` +
    `Dernier mois évité : &lt;b&gt;${latestMonthName || &#x27;aucun historique&#x27;}&lt;/b&gt;. ` +
    `Articles détectés à éviter : &lt;b&gt;${latestMonthItems.size}&lt;/b&gt;.` +
    `${historySheetNames.length &amp;&amp; latestMonthItems.size === 0 ? &#x27; ⚠️ Aucun article détecté dans l’historique : vérifie la colonne Item choisie.&#x27; : &#x27;&#x27;}`;
}

function updateRow(originalIndex, field, value){
  allRows.forEach(row=&gt;{
    if(row.originalIndex === originalIndex){
      if(field === &#x27;ecart&#x27;){
        const ecart = value === &#x27;&#x27; ? 0 : num(value);
        row.ecart = ecart;
        row.stockPhysique = row.stock + ecart;
      }

      if(field === &#x27;comment&#x27;){
        row.comment = value;
      }
    }
  });

  selectedRows.forEach(row=&gt;{
    if(row.originalIndex === originalIndex){
      if(field === &#x27;ecart&#x27;){
        const ecart = value === &#x27;&#x27; ? 0 : num(value);
        row.ecart = ecart;
        row.stockPhysique = row.stock + ecart;
      }

      if(field === &#x27;comment&#x27;){
        row.comment = value;
      }
    }
  });

  renderTables();
}

function renderAll(uniqueItems, targets){
  els.kpiItems.innerText = fmt(uniqueItems);
  els.kpiSelected.innerText = fmt(selectedItemKeys.size);
  els.kpiLines.innerText = fmt(selectedRows.length);
  els.kpiA.innerText = fmt(targets.A);
  els.kpiB.innerText = fmt(targets.B);
  els.kpiC.innerText = fmt(targets.C);

  renderTables();

  els.mainInfo.innerHTML =
    `Stock complet : &lt;b&gt;${allRows.length}&lt;/b&gt; lignes. Sélection : &lt;b&gt;${selectedRows.length}&lt;/b&gt; lignes = &lt;b&gt;${selectedItemKeys.size}&lt;/b&gt; articles.`;

  els.extraInfo.innerHTML =
    `Quotas appliqués : A=${targets.A}, B=${targets.B}, C=${targets.C}. Dernier mois évité : &lt;b&gt;${latestMonthName || &#x27;aucun historique&#x27;}&lt;/b&gt;.`;
}

function rowHTML(row){
  const absValue = Math.abs(row.ecart);
  const ecartClass = row.ecart &gt; 0 ? &#x27;positive&#x27; : row.ecart &lt; 0 ? &#x27;negative&#x27; : &#x27;&#x27;;
  const selectedClass = row.selected ? &#x27;selected-row&#x27; : &#x27;&#x27;;

  return `
    &lt;tr class=&quot;${selectedClass}&quot;&gt;
      &lt;td&gt;${esc(row.location)}&lt;/td&gt;
      &lt;td&gt;${esc(row.item)}&lt;/td&gt;
      &lt;td&gt;${fmt(row.stock)}&lt;/td&gt;
      &lt;td&gt;${fmt(row.stockPhysique)}&lt;/td&gt;
      &lt;td&gt;
        &lt;input type=&quot;number&quot; step=&quot;any&quot; value=&quot;${row.ecart}&quot; onchange=&quot;updateRow(${row.originalIndex}, &#x27;ecart&#x27;, this.value)&quot;&gt;
      &lt;/td&gt;
      &lt;td&gt;
        &lt;input class=&quot;comment-input&quot; value=&quot;${esc(row.comment)}&quot; onchange=&quot;updateRow(${row.originalIndex}, &#x27;comment&#x27;, this.value)&quot;&gt;
      &lt;/td&gt;
      &lt;td&gt;&lt;span class=&quot;badge badge-${row.cls}&quot;&gt;${row.cls}&lt;/span&gt;&lt;/td&gt;
      &lt;td&gt;${fmt(row.nbrLocation)}&lt;/td&gt;
      &lt;td&gt;&lt;b&gt;${fmt(row.nbrAfter)}&lt;/b&gt;&lt;/td&gt;
      &lt;td class=&quot;${ecartClass}&quot;&gt;${fmt(absValue)}&lt;/td&gt;
    &lt;/tr&gt;
  `;
}

function rowsWithClassGroups(rows){
  const sorted = sortRows(rows);
  const groups = {A:[], B:[], C:[]};

  sorted.forEach(row=&gt;{
    if(groups[row.cls]) groups[row.cls].push(row);
  });

  let output = &#x27;&#x27;;

  [&#x27;A&#x27;,&#x27;B&#x27;,&#x27;C&#x27;].forEach(cls=&gt;{
    const classRows = groups[cls];
    if(!classRows.length) return;

    const uniqueItems = new Set(classRows.map(r=&gt;norm(r.item))).size;

    output += `
      &lt;tr class=&quot;group-row&quot;&gt;
        &lt;td colspan=&quot;10&quot;&gt;Classe ${cls} — ${classRows.length} article(s) sélectionné(s)&lt;/td&gt;
      &lt;/tr&gt;
    `;

    output += classRows.map(rowHTML).join(&#x27;&#x27;);
  });

  return output;
}

function renderTables(){
  els.allTable.innerHTML = sortRows(allRows).map(rowHTML).join(&#x27;&#x27;);

  const filterElement = document.getElementById(&#x27;selectedClassFilter&#x27;);
  const filter = filterElement ? filterElement.value : &#x27;ALL&#x27;;

  const rows = filter === &#x27;ALL&#x27;
    ? selectedRows
    : selectedRows.filter(row=&gt;row.cls === filter);

  els.selectedTable.innerHTML = rowsWithClassGroups(rows);
}

function rowsForExport(rows){
  return sortRows(rows).map(row=&gt;({
    &#x27;Current Location&#x27;:row.location,
    &#x27;Item&#x27;:row.item,
    &#x27;Stock on Hand&#x27;:row.stock,
    &#x27;Stock Physique&#x27;:row.stockPhysique,
    &#x27;Ecart&#x27;:row.ecart,
    &#x27;Comment&#x27;:row.comment,
    &#x27;Velocity Class&#x27;:row.cls,
    &quot;Nbr d&#x27;emplacement&quot;:row.nbrLocation,
    &#x27;Nbr de fois inventoriée&#x27;:row.nbrAfter,
    &#x27;ABS&#x27;:Math.abs(row.ecart)
  }));
}

function exportSelectedExcel(){
  if(!selectedRows.length){
    alert(&#x27;Génère d’abord la sélection.&#x27;);
    return;
  }

  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    wb,
    XLSX.utils.json_to_sheet(rowsForExport(selectedRows)),
    &#x27;Articles_A_Inventorier&#x27;
  );

  XLSX.writeFile(wb, &#x27;Articles_A_Inventorier.xlsx&#x27;);
}

function exportAllUpdatedExcel(){
  if(!allRows.length){
    alert(&#x27;Génère d’abord la sélection.&#x27;);
    return;
  }

  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    wb,
    XLSX.utils.json_to_sheet(rowsForExport(allRows)),
    &#x27;Stock_Complet_MAJ&#x27;
  );

  XLSX.writeFile(wb, &#x27;Stock_Complet_Mis_A_Jour.xlsx&#x27;);
}

            &lt;button class=&quot;secondary&quot; onclick=&quot;exportExcel()&quot;&gt;Télécharger Excel ABC&lt;/button&gt;
        &lt;/div&gt;

        &lt;div id=&quot;info&quot; class=&quot;info&quot;&gt;Aucun fichier importé.&lt;/div&gt;
    &lt;/div&gt;

    &lt;input type=&quot;file&quot; id=&quot;fileInput&quot; accept=&quot;.xlsx,.xls,.csv&quot;&gt;
&lt;/div&gt;

&lt;div class=&quot;kpis&quot;&gt;
    &lt;div class=&quot;card kpi&quot;&gt;
        &lt;div class=&quot;kpi-label&quot;&gt;Articles analysés&lt;/div&gt;
        &lt;div id=&quot;kpiArticles&quot; class=&quot;kpi-value&quot;&gt;0&lt;/div&gt;
        &lt;div class=&quot;kpi-sub&quot;&gt;Références uniques&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card kpi&quot;&gt;
        &lt;div class=&quot;kpi-label&quot;&gt;Quantité totale&lt;/div&gt;
        &lt;div id=&quot;kpiQty&quot; class=&quot;kpi-value&quot;&gt;0&lt;/div&gt;
        &lt;div class=&quot;kpi-sub&quot;&gt;Volume total&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card kpi&quot;&gt;
        &lt;div class=&quot;kpi-label&quot;&gt;À inventorier - Classe A&lt;/div&gt;
        &lt;div id=&quot;kpiInvA&quot; class=&quot;kpi-value&quot;&gt;0&lt;/div&gt;
        &lt;div class=&quot;kpi-sub&quot;&gt;33% des articles A&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card kpi&quot;&gt;
        &lt;div class=&quot;kpi-label&quot;&gt;À inventorier - Classe B&lt;/div&gt;
        &lt;div id=&quot;kpiInvB&quot; class=&quot;kpi-value&quot;&gt;0&lt;/div&gt;
        &lt;div class=&quot;kpi-sub&quot;&gt;16% des articles B&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card kpi&quot;&gt;
        &lt;div class=&quot;kpi-label&quot;&gt;À inventorier - Classe C&lt;/div&gt;
        &lt;div id=&quot;kpiInvC&quot; class=&quot;kpi-value&quot;&gt;0&lt;/div&gt;
        &lt;div class=&quot;kpi-sub&quot;&gt;8% des articles C&lt;/div&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;grid&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
        &lt;h2&gt;Analyse Pareto&lt;/h2&gt;
        &lt;div class=&quot;small&quot;&gt;Top articles par quantité&lt;/div&gt;
        &lt;div class=&quot;chart&quot;&gt;
            &lt;canvas id=&quot;paretoChart&quot;&gt;&lt;/canvas&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
        &lt;h2&gt;Répartition ABC&lt;/h2&gt;
        &lt;div class=&quot;small&quot;&gt;Nombre d’articles par classe&lt;/div&gt;
        &lt;div class=&quot;donut&quot;&gt;
            &lt;canvas id=&quot;abcChart&quot;&gt;&lt;/canvas&gt;
        &lt;/div&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;toolbar&quot;&gt;
        &lt;div&gt;
            &lt;h2&gt;Tableau ABC complet&lt;/h2&gt;
            &lt;div class=&quot;small&quot;&gt;Résultat détaillé du calcul&lt;/div&gt;
        &lt;/div&gt;
        &lt;input id=&quot;searchInput&quot; class=&quot;search&quot; placeholder=&quot;Rechercher article...&quot; oninput=&quot;renderTable()&quot;&gt;
    &lt;/div&gt;

    &lt;table&gt;
        &lt;thead&gt;
            &lt;tr&gt;
                &lt;th&gt;Article&lt;/th&gt;
                &lt;th&gt;Quantité totale&lt;/th&gt;
                &lt;th&gt;Fréquence&lt;/th&gt;
                &lt;th&gt;Fréquence cumulée&lt;/th&gt;
                &lt;th&gt;Classe&lt;/th&gt;
            &lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody id=&quot;fullTable&quot;&gt;&lt;/tbody&gt;
    &lt;/table&gt;
&lt;/div&gt;

&lt;/div&gt;

&lt;script&gt;
let workbookData = null;
let currentRows = [];
let processedResults = [];
let paretoChart = null;
let abcChart = null;

const fileInput = document.getElementById(&#x27;fileInput&#x27;);
const sheetSelect = document.getElementById(&#x27;sheetSelect&#x27;);
const articleSelect = document.getElementById(&#x27;articleSelect&#x27;);
const qtySelect = document.getElementById(&#x27;qtySelect&#x27;);

fileInput.addEventListener(&#x27;change&#x27;, function(e){
    resetData();

    const file = e.target.files[0];
    if(!file) return;

    const ext = file.name.split(&#x27;.&#x27;).pop().toLowerCase();

    if(ext === &#x27;csv&#x27;){
        Papa.parse(file, {
            header:true,
            skipEmptyLines:true,
            transformHeader:h=&gt;cleanHeader(h),
            complete:function(results){
                workbookData = {CSV:results.data};
                setupSheetSelector([&#x27;CSV&#x27;]);
                loadSheet(&#x27;CSV&#x27;);
            }
        });
    } else {
        const reader = new FileReader();

        reader.onload = function(evt){
            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, {type:&#x27;array&#x27;});

            workbookData = {};

            wb.SheetNames.forEach(name=&gt;{
                const ws = wb.Sheets[name];

                workbookData[name] = XLSX.utils.sheet_to_json(ws, {
                    defval:&#x27;&#x27;,
                    raw:true
                }).map(row=&gt;{
                    const cleaned = {};
                    Object.keys(row).forEach(k=&gt;{
                        cleaned[cleanHeader(k)] = row[k];
                    });
                    return cleaned;
                });
            });

            setupSheetSelector(wb.SheetNames);

            const defaultSheet = wb.SheetNames.includes(&#x27;BD&#x27;) ? &#x27;BD&#x27; : wb.SheetNames[0];
            sheetSelect.value = defaultSheet;
            loadSheet(defaultSheet);
        };

        reader.readAsArrayBuffer(file);
    }

    e.target.value = &#x27;&#x27;;
});

sheetSelect.addEventListener(&#x27;change&#x27;, function(){
    loadSheet(this.value);
});

function resetData(){
    workbookData = null;
    currentRows = [];
    processedResults = [];

    document.getElementById(&#x27;controls&#x27;).classList.add(&#x27;hidden&#x27;);
    document.getElementById(&#x27;info&#x27;).innerHTML = &#x27;Aucun fichier importé.&#x27;;
    document.getElementById(&#x27;fullTable&#x27;).innerHTML = &#x27;&#x27;;

    updateKPIs(0, 0, {A:0,B:0,C:0});

    if(paretoChart){
        paretoChart.destroy();
        paretoChart = null;
    }

    if(abcChart){
        abcChart.destroy();
        abcChart = null;
    }
}

function cleanHeader(h){
    return String(h || &#x27;&#x27;).replace(/\u00A0/g,&#x27; &#x27;).trim();
}

function normalizeName(n){
    return cleanHeader(n)
        .toLowerCase()
        .normalize(&#x27;NFD&#x27;)
        .replace(/[\u0300-\u036f]/g,&#x27;&#x27;)
        .replace(/\s+/g,&#x27;&#x27;);
}

function setupSheetSelector(names){
    sheetSelect.innerHTML = &#x27;&#x27;;
    names.forEach(n=&gt;sheetSelect.add(new Option(n,n)));
    document.getElementById(&#x27;controls&#x27;).classList.remove(&#x27;hidden&#x27;);
}

function loadSheet(name){
    currentRows = workbookData[name] || [];

    const fields = Object.keys(currentRows[0] || {});

    articleSelect.innerHTML = &#x27;&#x27;;
    qtySelect.innerHTML = &#x27;&#x27;;

    fields.forEach(f=&gt;{
        articleSelect.add(new Option(f,f));
        qtySelect.add(new Option(f,f));
    });

    autoSelectColumn(articleSelect, [&#x27;article&#x27;,&#x27;articles&#x27;,&#x27;ref&#x27;,&#x27;reference&#x27;,&#x27;sku&#x27;,&#x27;item&#x27;]);
    autoSelectColumn(qtySelect, [&#x27;qty&#x27;,&#x27;qte&#x27;,&#x27;quantite&#x27;,&#x27;quantity&#x27;]);

    document.getElementById(&#x27;info&#x27;).innerHTML =
        `Feuille chargée : &lt;b&gt;${name}&lt;/b&gt; — ${currentRows.length} lignes. Clique sur &lt;b&gt;Calculer&lt;/b&gt;.`;
}

function autoSelectColumn(sel, candidates){
    const opts = Array.from(sel.options);

    for(const c of candidates){
        const found = opts.find(o=&gt;normalizeName(o.value) === c);
        if(found){
            sel.value = found.value;
            return;
        }
    }

    for(const c of candidates){
        const found = opts.find(o=&gt;normalizeName(o.value).includes(c));
        if(found){
            sel.value = found.value;
            return;
        }
    }
}

function parseNumber(v){
    if(v === null || v === undefined || v === &#x27;&#x27;) return 0;
    if(typeof v === &#x27;number&#x27;) return v;

    let s = String(v)
        .replace(/\u00A0/g,&#x27;&#x27;)
        .replace(/\s/g,&#x27;&#x27;)
        .trim();

    if(s.includes(&#x27;,&#x27;) &amp;&amp; s.includes(&#x27;.&#x27;)){
        s = s.replace(/\./g,&#x27;&#x27;).replace(&#x27;,&#x27;,&#x27;.&#x27;);
    } else {
        s = s.replace(&#x27;,&#x27;,&#x27;.&#x27;);
    }

    const n = Number(s);
    return isNaN(n) ? 0 : n;
}

function calculateABC(){
    const articleCol = articleSelect.value;
    const qtyCol = qtySelect.value;

    const aggregation = {};

    currentRows.forEach(row=&gt;{
        const article = cleanHeader(row[articleCol]);
        const qty = parseNumber(row[qtyCol]);

        if(article){
            aggregation[article] = (aggregation[article] || 0) + qty;
        }
    });

    const sorted = Object.entries(aggregation)
        .filter(([article, qty])=&gt;article &amp;&amp; qty !== 0)
        .sort((a,b)=&gt;b[1]-a[1]);

    const total = sorted.reduce((sum, item)=&gt;sum + item[1], 0);

    let cumulative = 0;
    processedResults = [];

    sorted.forEach(([article, qty])=&gt;{
        cumulative += qty;

        const frequency = total ? qty / total : 0;
        const cumulativeFrequency = total ? cumulative / total : 0;

        let cls = &#x27;C&#x27;;

        if(cumulativeFrequency &lt; 0.80){
            cls = &#x27;A&#x27;;
        } else if(cumulativeFrequency &lt; 0.95){
            cls = &#x27;B&#x27;;
        }

        processedResults.push({
            article,
            qty,
            frequency,
            cumulativeFrequency,
            cls
        });
    });

    const counts = countClasses();

    updateKPIs(processedResults.length, total, counts);
    renderTable();
    renderCharts();

    document.getElementById(&#x27;info&#x27;).innerHTML =
        `Calcul terminé : &lt;b&gt;${processedResults.length}&lt;/b&gt; articles — Quantité totale : &lt;b&gt;${formatNumber(total)}&lt;/b&gt;.`;
}

function countClasses(){
    const counts = {A:0,B:0,C:0};

    processedResults.forEach(r=&gt;{
        counts[r.cls]++;
    });

    return counts;
}

function inventoryTargets(counts){
    return {
        A: Math.ceil(counts.A * 0.33),
        B: Math.ceil(counts.B * 0.16),
        C: Math.ceil(counts.C * 0.08)
    };
}

function updateKPIs(articleCount, totalQty, counts){
    const targets = inventoryTargets(counts);

    document.getElementById(&#x27;kpiArticles&#x27;).innerText = formatNumber(articleCount);
    document.getElementById(&#x27;kpiQty&#x27;).innerText = formatNumber(totalQty);
    document.getElementById(&#x27;kpiInvA&#x27;).innerText = formatNumber(targets.A);
    document.getElementById(&#x27;kpiInvB&#x27;).innerText = formatNumber(targets.B);
    document.getElementById(&#x27;kpiInvC&#x27;).innerText = formatNumber(targets.C);
}

function renderTable(){
    const search = normalizeName(document.getElementById(&#x27;searchInput&#x27;).value || &#x27;&#x27;);

    const filtered = processedResults.filter(r=&gt;{
        return normalizeName(r.article).includes(search);
    });

    document.getElementById(&#x27;fullTable&#x27;).innerHTML = filtered.map(r=&gt;`
        &lt;tr&gt;
            &lt;td&gt;${escapeHtml(r.article)}&lt;/td&gt;
            &lt;td&gt;${formatNumber(r.qty)}&lt;/td&gt;
            &lt;td&gt;${formatPercent(r.frequency)}&lt;/td&gt;
            &lt;td&gt;${formatPercent(r.cumulativeFrequency)}&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;badge badge-${r.cls}&quot;&gt;${r.cls}&lt;/span&gt;&lt;/td&gt;
        &lt;/tr&gt;
    `).join(&#x27;&#x27;);
}

function renderCharts(){
    const top = processedResults.slice(0,15);
    const counts = countClasses();

    if(paretoChart) paretoChart.destroy();
    if(abcChart) abcChart.destroy();

    paretoChart = new Chart(document.getElementById(&#x27;paretoChart&#x27;), {
        type:&#x27;bar&#x27;,
        data:{
            labels:top.map(r=&gt;r.article),
            datasets:[{
                label:&#x27;Quantité&#x27;,
                data:top.map(r=&gt;r.qty),
                backgroundColor:&#x27;#009639&#x27;
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{y:{beginAtZero:true}}
        }
    });

    abcChart = new Chart(document.getElementById(&#x27;abcChart&#x27;), {
        type:&#x27;doughnut&#x27;,
        data:{
            labels:[&#x27;A&#x27;,&#x27;B&#x27;,&#x27;C&#x27;],
            datasets:[{
                data:[counts.A, counts.B, counts.C],
                backgroundColor:[&#x27;#d9534f&#x27;,&#x27;#f0ad4e&#x27;,&#x27;#5cb85c&#x27;]
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{legend:{position:&#x27;bottom&#x27;}}
        }
    });
}

function exportExcel(){
    if(!processedResults.length){
        alert(&#x27;Lance d’abord le calcul ABC.&#x27;);
        return;
    }

    const counts = countClasses();
    const targets = inventoryTargets(counts);

    const rows = processedResults.map(r=&gt;({
        Article:r.article,
        Quantite_Totale:r.qty,
        Frequence:r.frequency,
        Frequence_Cumulee:r.cumulativeFrequency,
        Classe:r.cls
    }));

    const resume = [
        {Classe:&#x27;A&#x27;, Articles_Classe:counts.A, Pourcentage_Inventaire:&#x27;33%&#x27;, Articles_A_Inventorier:targets.A},
        {Classe:&#x27;B&#x27;, Articles_Classe:counts.B, Pourcentage_Inventaire:&#x27;16%&#x27;, Articles_A_Inventorier:targets.B},
        {Classe:&#x27;C&#x27;, Articles_Classe:counts.C, Pourcentage_Inventaire:&#x27;8%&#x27;, Articles_A_Inventorier:targets.C}
    ];

    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), &#x27;ABC&#x27;);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resume), &#x27;Synthese_Inventaire&#x27;);

    XLSX.writeFile(wb, &#x27;rapport_abc_inventaire.xlsx&#x27;);
}

function formatNumber(n){
    return Number(n || 0).toLocaleString(&#x27;fr-FR&#x27;, {
        maximumFractionDigits:2
    });
}

function formatPercent(n){
    return (Number(n || 0) * 100).toLocaleString(&#x27;fr-FR&#x27;, {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    }) + &#x27; %&#x27;;
}

function escapeHtml(v){
    return String(v)
        .replace(/&amp;/g,&#x27;&amp;amp;&#x27;)
        .replace(/&lt;/g,&#x27;&amp;lt;&#x27;)
        .replace(/&gt;/g,&#x27;&amp;gt;&#x27;)
        .replace(/&quot;/g,&#x27;&amp;quot;&#x27;)
        .replace(/&#x27;/g,&#x27;&amp;#039;&#x27;);
}
&lt;/script&gt;

&lt;/body&gt;

"></iframe>
</div>

<script>
function showTab(id, button){
  document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  button.classList.add('active');
}
</script>
