<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Schneider - Digitalisation Inventaire</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
    :root { --g:#009639; --bg:#f4f7f4; --s:#fff; --b:#d1d8d1; --t:#1a1f1a; }
    body { font-family: sans-serif; background:var(--bg); color:var(--t); margin:0; padding:20px; }
    .header { background: var(--g); color: white; padding: 20px; border-radius: 12px 12px 0 0; }
    .card { background: var(--s); border: 1px solid var(--b); border-radius: 0 0 12px 12px; padding: 25px; margin-bottom: 20px; }
    .stats-grid { display: flex; gap: 20px; margin-bottom: 25px; margin-top:20px; }
    .stat-card { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid var(--b); text-align: center; background: white; }
    .stat-val { font-size: 24px; font-weight: bold; display: block; color: var(--g); }
    .quota-msg { font-size: 13px; color: #c0392b; margin-top: 10px; font-weight: bold; background: #fdf0ef; padding: 5px; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
    th { background: #f8faf8; padding: 12px; text-align: left; border-bottom: 2px solid var(--b); }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; }
    .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-main { background: var(--g); color: white; }
    .btn-excel { background: #1a1f1a; color: white; }
</style>
</head>
<body>

<div class="header">
    <h1 style="margin:0;">Digitalisation Inventaire Annuel</h1>
    <p style="margin:5px 0 0 0;">Objectifs du rapport : A (33%) | B (16%) | C (8%)</p>
</div>

<div class="card">
    <button class="btn btn-main" onclick="document.getElementById('csv').click()">📁 Charger l'extraction SAP (.csv)</button>
    <input type="file" id="csv" accept=".csv" style="display:none">
    
    <div id="dashboard" style="display:none">
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-val" id="countA">0</span>
                <span>Articles Classe A</span>
                <div class="quota-msg">À COMPTER CE MOIS : <span id="qA">0</span></div>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="countB">0</span>
                <span>Articles Classe B</span>
                <div class="quota-msg">À COMPTER CE MOIS : <span id="qB">0</span></div>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="countC">0</span>
                <span>Articles Classe C</span>
                <div class="quota-msg">À COMPTER CE MOIS : <span id="qC">0</span></div>
            </div>
        </div>

        <div style="display:flex; justify-content: space-between; align-items:center;">
            <h3>Articles à choisir en priorité</h3>
            <button class="btn btn-excel" onclick="exportExcel()">📥 Exporter vers EXCEL</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Article</th>
                    <th style="text-align:right">Volume</th>
                    <th>Classification</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>
</div>

<script>
let finalData = [];

document.getElementById('csv').onchange = e => {
    Papa.parse(e.target.files[0], {
        header: true, skipEmptyLines: true,
        complete: function(r) {
            processData(r.data, r.meta.fields);
            document.getElementById('dashboard').style.display = 'block';
        }
    });
};

function processData(data, fields) {
    // Détection automatique des colonnes
    const artCol = fields.find(f => /art|item|ref/i.test(f));
    const qtyCol = fields.find(f => /qty|stock|hand|quant/i.test(f));
    
    let stats = {};
    data.forEach(row => {
        let a = String(row[artCol] || '').trim().toUpperCase();
        let q = parseFloat(String(row[qtyCol] || '0').replace(/\s/g,'').replace(',','.')) || 0;
        if(a) stats[a] = (stats[a] || 0) + q;
    });

    let sorted = Object.entries(stats).sort((a,b) => b[1] - a[1]);
    let totVol = sorted.reduce((s,x) => s + x[1], 0);
    let cum = 0;
    let counts = {A:0, B:0, C:0};
    finalData = [];

    sorted.forEach(([ref, q]) => {
        cum += q;
        let p = (cum/totVol)*100;
        let cl = p <= 80.0001 ? 'A' : (p <= 95.0001 ? 'B' : 'C');
        counts[cl]++;
        finalData.push({ Article: ref, Volume: Math.round(q), Classe: cl });
    });

    // Mise à jour des chiffres du rapport
    document.getElementById('countA').innerText = counts.A;
    document.getElementById('countB').innerText = counts.B;
    document.getElementById('countC').innerText = counts.C;
    
    // Calcul des quotas mensuels du rapport (33%, 16%, 8%)
    document.getElementById('qA').innerText = Math.round(counts.A * 0.33);
    document.getElementById('qB').innerText = Math.round(counts.B * 0.16);
    document.getElementById('qC').innerText = Math.round(counts.C * 0.08);

    document.getElementById('resBody').innerHTML = finalData.slice(0, 100).map(i => `
        <tr>
            <td>${i.Article}</td>
            <td style="text-align:right">${i.Volume.toLocaleString()}</td>
            <td><span style="font-weight:bold; color:${i.Classe==='A'?'#e74c3c':i.Classe==='B'?'#f1c40f':'#2ecc71'}">Classe ${i.Classe}</span></td>
            <td>${i.Classe==='A'?'Priorité 1':'Priorité 2/3'}</td>
        </tr>
    `).join('');
}

function exportExcel() {
    const ws = XLSX.utils.json_to_sheet(finalData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Inventaire");
    XLSX.writeFile(wb, "Plan_Inventaire_Schneider.xlsx");
}
</script>
</body>
</html>
