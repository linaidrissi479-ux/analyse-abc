<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;font-family:Arial,sans-serif;background:#f4f6f8}

</div>

</div>

<script>
function showTab(id,button){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  button.classList.add('active');
}

document.getElementById('invFrame').srcdoc = `<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<title>Préparation Inventaire ABC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>
<style>

</style></head><body>

<div class="header">

<div class="container">

<div class="card">

  <button onclick="generateInventory()">Générer la sélection</button>
  <button class="secondary" onclick="exportSelectedExcel()">Télécharger sélection à inventorier</button>
  <button class="secondary" onclick="exportAllUpdatedExcel()">Télécharger stock complet mis à jour</button>
  <p id="mainInfo" class="info"></p>
</div>

<div class="kpis">
  <div class="card kpi"><div class="kpi-label">Articles stock</div><div id="kpiItems" class="kpi-value">0</div><div class="kpi-sub">Références uniques</div></div>

  <div class="card kpi"><div class="kpi-label">À inventorier B</div><div id="kpiB" class="kpi-value">0</div><div class="kpi-sub">16%</div></div>

</div>

<div class="card">
  <div class="toolbar"><h2 style="margin:0">Stock complet</h2><button class="secondary" onclick="exportAllUpdatedExcel()">Télécharger ce tableau</button></div>
  <div class="table-wrap"><table><thead><tr><th>Current Location</th><th>Item</th><th>Stock on Hand</th><th>Stock Physique</th><th>Ecart</th><th>Comment</th><th>Velocity Class</th><th>Nbr d'emplacement</th><th>Nbr de fois inventoriée</th><th>ABS</th></tr></thead><tbody id="allTable"></tbody></table></div>
</div>

<div class="card">
  <div class="toolbar">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <h2 style="margin:0">Articles sélectionnés à inventorier</h2>
      <select id="selectedClassFilter" onchange="renderTables()"><option value="ALL">Tous</option><option value="A">Classe A</option><option value="B">Classe B</option><option value="C">Classe C</option></select>
    </div>
    <button class="secondary" onclick="exportSelectedExcel()">Télécharger ce tableau</button>
  </div>
  <div class="table-wrap"><table><thead><tr><th>Current Location</th><th>Item</th><th>Stock on Hand</th><th>Stock Physique</th><th>Ecart</th><th>Comment</th><th>Velocity Class</th><th>Nbr d'emplacement</th><th>Nbr de fois inventoriée</th><th>ABS</th></tr></thead><tbody id="selectedTable"></tbody></table></div>
</div>
</div>

<script>
let stockWorkbook={},historyWorkbook={},stockRows=[],historySheetNames=[];
let allRows=[],selectedRows=[],selectedItemKeys=new Set();
let historyCountByItem={};

// ── CLÉS NORMALISÉES — gère les nombres ET les textes ──
function normKey(v){
  return String(v===null||v===undefined?'':v)
    .replace(/\u00A0/g,' ').trim()
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,'');
}

function clean(v){return String(v===null||v===undefined?'':v).replace(/^\uFEFF/,'').replace(/\u00A0/g,' ').trim()}
function num(v){
  if(v===null||v===undefined||v==='')return 0;
  if(typeof v==='number')return v;
  let s=String(v).replace(/\u00A0/g,'').replace(/\s/g,'').trim();
  if(s.includes(',')&&s.includes('.'))s=s.replace(/\./g,'').replace(',','.');
  else s=s.replace(',','.');
  const n=Number(s);return isNaN(n)?0:n;
}
function fmt(n){return Number(n||0).toLocaleString('fr-FR',{maximumFractionDigits:2})}
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function loadAnyFile(file,callback){
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  if(ext==='csv'){
    reader.onload=evt=>{
      const content=evt.target.result;
      const first=(content.split(/\r?\n/).find(l=>l.trim())||'');
      const counts={';':first.split(';').length,',':first.split(',').length,'\\t':first.split('\t').length};
      const delim=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
      const lines=content.split(/\r?\n/).filter(l=>l.trim());
      const headers=lines[0].split(delim).map(h=>clean(h));
      const rows=lines.slice(1).map(line=>{
        const vals=line.split(delim);
        const obj={};
        headers.forEach((h,i)=>obj[h]=clean(vals[i]||''));
        return obj;
      });
      callback({CSV:rows},['CSV']);
    };
    reader.readAsText(file,'utf-8');
  } else {
    reader.onload=evt=>{
      const data=new Uint8Array(evt.target.result);
      const wb=XLSX.read(data,{type:'array',cellDates:true});
      const output={};
      wb.SheetNames.forEach(name=>{
        output[name]=XLSX.utils.sheet_to_json(wb.Sheets[name],{defval:'',raw:true}).map(row=>{
          const obj={};
          Object.keys(row).forEach(k=>obj[clean(k)]=row[k]);
          return obj;
        });
      });
      callback(output,wb.SheetNames);
    };
    reader.readAsArrayBuffer(file);
  }
}

function fillSelect(sel,fields,withBlank=false){
  sel.innerHTML='';
  if(withBlank)sel.add(new Option('-- Aucun --',''));
  fields.forEach(f=>sel.add(new Option(f,f)));
}

function autoSelect(sel,candidates){
  const opts=Array.from(sel.options);
  for(const c of candidates){
    const found=opts.find(o=>normKey(o.value)===normKey(c));
    if(found){sel.value=found.value;return}
  }
  for(const c of candidates){
    const found=opts.find(o=>normKey(o.value).includes(normKey(c)));
    if(found){sel.value=found.value;return}
  }
}

// ── STOCK ──
document.getElementById('stockFile').addEventListener('change',e=>{
  loadAnyFile(e.target.files[0],(wb,names)=>{
    stockWorkbook=wb;
    document.getElementById('stockControls').classList.remove('hidden');
    const sel=document.getElementById('stockSheet');
    fillSelect(sel,names);
    sel.onchange=()=>loadStockSheet(sel.value);
    sel.value=names[0];
    loadStockSheet(names[0]);
  });
});

function loadStockSheet(name){
  stockRows=stockWorkbook[name]||[];
  const fields=Object.keys(stockRows[0]||{});
  ['stockLocation','stockItem','stockClass','stockQty'].forEach(id=>fillSelect(document.getElementById(id),fields));
  autoSelect(document.getElementById('stockLocation'),['CURRENT LOCATION','Current Location','Location','Emplacement']);
  autoSelect(document.getElementById('stockItem'),['ITEM CODE','Item Code','Item','Article','ARTICLE']);
  autoSelect(document.getElementById('stockClass'),['VELOCITY CLASS','Velocity Class','Classe','ABC']);
  autoSelect(document.getElementById('stockQty'),['STOCK ON HAND','Stock on Hand','Stock']);
  document.getElementById('stockInfo').innerHTML='Fichier stock chargé : <b>'+name+'</b> — '+stockRows.length+' lignes.';
}

// ── HISTORIQUE ──
document.getElementById('historyFile').addEventListener('change',e=>{
  loadAnyFile(e.target.files[0],(wb,names)=>{
    historyWorkbook=wb;
    historySheetNames=names;
    document.getElementById('historyControls').classList.remove('hidden');
    const sel=document.getElementById('historySheet');
    fillSelect(sel,names);
    sel.onchange=()=>loadHistorySheet(sel.value);
    sel.value=names[0];
    loadHistorySheet(names[0]);
  });
});

function loadHistorySheet(name){
  const rows=historyWorkbook[name]||[];
  const fields=Object.keys(rows[0]||{});
  fillSelect(document.getElementById('historyItem'),fields);
  fillSelect(document.getElementById('historyCount'),fields,true);
  autoSelect(document.getElementById('historyItem'),['Item','ITEM CODE','Item Code','Article','ARTICLE']);
  autoSelect(document.getElementById('historyCount'),['Nbr de fois inventoriée','Nbr de fois inventoriee','Nbr fois','Nombre de fois','Count']);
  buildHistory();
}

document.getElementById('historyItem').addEventListener('change',buildHistory);
document.getElementById('historyCount').addEventListener('change',buildHistory);
document.getElementById('historySheet').addEventListener('change',()=>{
  loadHistorySheet(document.getElementById('historySheet').value);
});

function buildHistory(){
  historyCountByItem={};
  if(!historySheetNames.length)return;

  historySheetNames.forEach(sheetName=>{
    const rows=historyWorkbook[sheetName]||[];
    if(!rows.length)return;

    const itemField=document.getElementById('historyItem').value;
    const countField=document.getElementById('historyCount').value;

    rows.forEach(row=>{
      // normKey gère les nombres ET les textes identiquement
      const rawItem=row[itemField];
      if(rawItem===null||rawItem===undefined||rawItem==='')return;
      const key=normKey(rawItem);
      if(!key)return;

      if(countField&&row[countField]!==undefined&&row[countField]!==''){
        const countValue=num(row[countField]);
        if(countValue>0){
          historyCountByItem[key]=Math.max(historyCountByItem[key]||0,countValue);
        }
      } else {
        historyCountByItem[key]=(historyCountByItem[key]||0)+1;
      }
    });
  });

  const total=Object.keys(historyCountByItem).length;
  document.getElementById('historyInfo').innerHTML=
    'Historique chargé : <b>'+total+'</b> articles détectés. '+
    'Colonne item : <b>'+(document.getElementById('historyItem').value||'auto')+'</b>. '+
    'Colonne comptage : <b>'+(document.getElementById('historyCount').value||'1 par ligne')+'</b>.';
}

// ── GÉNÉRATION ──
function targetRate(cls){return cls==='A'?0.33:cls==='B'?0.16:0.08}
function classOrder(cls){return{A:1,B:2,C:3}[cls]||99}

function generateInventory(){
  if(!stockRows.length){alert('Importe d\'abord le fichier stock.');return}

  const locCol=document.getElementById('stockLocation').value;
  const itemCol=document.getElementById('stockItem').value;
  const clsCol=document.getElementById('stockClass').value;
  const qtyCol=document.getElementById('stockQty').value;

  const stockByItem={};

  stockRows.forEach((row,idx)=>{
    const rawItem=row[itemCol];
    const item=clean(rawItem);
    const cls=String(row[clsCol]||'').trim().toUpperCase();
    if(!item||!['A','B','C'].includes(cls))return;

    // normKey utilisé de façon identique pour stock ET historique
    const key=normKey(rawItem);
    const location=clean(row[locCol]);
    const stock=num(row[qtyCol]);

    if(!stockByItem[key]){
      // historyCount cherché avec la même normKey
      const hCount=historyCountByItem[key]||0;
      stockByItem[key]={key,item,cls,rows:[],locations:new Set(),historyCount:hCount,selected:false};
    }
    if(classOrder(cls)<classOrder(stockByItem[key].cls))stockByItem[key].cls=cls;
    if(location)stockByItem[key].locations.add(location);
    stockByItem[key].rows.push({originalIndex:idx,key,location,item,stock,stockPhysique:stock,ecart:0,comment:'',cls});
  });

  const uniqueItems=Object.values(stockByItem);

  // Sélection par quota avec rotation
  const byClass={A:[],B:[],C:[]};
  uniqueItems.forEach(x=>{if(byClass[x.cls])byClass[x.cls].push(x)});

  uniqueItems.forEach(x=>x.selected=false);

  ['A','B','C'].forEach(cls=>{
    const arr=byClass[cls].slice();
    const n=Math.ceil(arr.length*targetRate(cls));
    // Trier : moins inventoriés en premier
    arr.sort((a,b)=>{
      if(a.historyCount!==b.historyCount)return a.historyCount-b.historyCount;
      return String(a.item).localeCompare(String(b.item));
    });
    arr.slice(0,n).forEach(x=>x.selected=true);
  });

  const targets={
    A:Math.ceil((byClass.A.length)*0.33),
    B:Math.ceil((byClass.B.length)*0.16),
    C:Math.ceil((byClass.C.length)*0.08)
  };

  allRows=[];selectedRows=[];selectedItemKeys=new Set();

  uniqueItems.forEach(item=>{
    const nbrLoc=item.locations.size||item.rows.length||1;
    const nbrAfter=item.selected?item.historyCount+1:item.historyCount;
    item.rows.forEach(row=>{
      allRows.push({...row,cls:item.cls,selected:item.selected,nbrLocation:nbrLoc,nbrBefore:item.historyCount,nbrAfter});
    });
    if(item.selected){
      selectedRows.push({...item.rows[0],cls:item.cls,selected:true,nbrLocation:nbrLoc,nbrBefore:item.historyCount,nbrAfter});
      selectedItemKeys.add(item.key);
    }
  });

  document.getElementById('kpiItems').innerText=fmt(uniqueItems.length);
  document.getElementById('kpiSelected').innerText=fmt(selectedItemKeys.size);
  document.getElementById('kpiLines').innerText=fmt(selectedRows.length);
  document.getElementById('kpiA').innerText=fmt(targets.A);
  document.getElementById('kpiB').innerText=fmt(targets.B);
  document.getElementById('kpiC').innerText=fmt(targets.C);
  document.getElementById('mainInfo').innerHTML='Stock : <b>'+allRows.length+'</b> lignes. Sélection : <b>'+selectedRows.length+'</b> lignes = <b>'+selectedItemKeys.size+'</b> articles.';

  renderTables();
}

function updateRow(idx,field,value){
  [allRows,selectedRows].forEach(arr=>{
    arr.forEach(row=>{
      if(row.originalIndex===idx){
        if(field==='ecart'){const e=value===''?0:num(value);row.ecart=e;row.stockPhysique=row.stock+e}
        if(field==='comment')row.comment=value;
      }
    });
  });
  renderTables();
}

function rowHTML(row){
  const abs=Math.abs(row.ecart);
  const ec=row.ecart>0?'positive':row.ecart<0?'negative':'';
  const sel=row.selected?'selected-row':'';
  return '<tr class="'+sel+'"><td>'+esc(row.location)+'</td><td>'+esc(row.item)+'</td><td>'+fmt(row.stock)+'</td><td>'+fmt(row.stockPhysique)+'</td><td><input type="number" step="any" value="'+row.ecart+'" onchange="updateRow('+row.originalIndex+',\'ecart\',this.value)"></td><td><input class="comment-input" value="'+esc(row.comment)+'" onchange="updateRow('+row.originalIndex+',\'comment\',this.value)"></td><td><span class="badge badge-'+row.cls+'">'+row.cls+'</span></td><td>'+fmt(row.nbrLocation)+'</td><td><b>'+fmt(row.nbrAfter)+'</b></td><td class="'+ec+'">'+fmt(abs)+'</td></tr>';
}

function sortRows(rows){
  return [...rows].sort((a,b)=>{
    const c=classOrder(a.cls)-classOrder(b.cls);
    if(c!==0)return c;
    const i=String(a.item).localeCompare(String(b.item));
    if(i!==0)return i;
    return String(a.location).localeCompare(String(b.location));
  });
}

function renderTables(){
  document.getElementById('allTable').innerHTML=sortRows(allRows).map(rowHTML).join('');
  const filter=document.getElementById('selectedClassFilter').value;
  const rows=filter==='ALL'?selectedRows:selectedRows.filter(r=>r.cls===filter);
  const sorted=sortRows(rows);
  let html='';
  ['A','B','C'].forEach(cls=>{
    const cr=sorted.filter(r=>r.cls===cls);
    if(!cr.length)return;
    html+='<tr class="group-row"><td colspan="10">Classe '+cls+' — '+cr.length+' article(s)</td></tr>';
    html+=cr.map(rowHTML).join('');
  });
  document.getElementById('selectedTable').innerHTML=html;
}

function rowsForExport(rows){
  return sortRows(rows).map(row=>({
    'Current Location':row.location,'Item':row.item,'Stock on Hand':row.stock,
    'Stock Physique':row.stockPhysique,'Ecart':row.ecart,'Comment':row.comment,
    'Velocity Class':row.cls,"Nbr d'emplacement":row.nbrLocation,
    'Nbr de fois inventoriée':row.nbrAfter,'ABS':Math.abs(row.ecart)
  }));
}

function exportSelectedExcel(){
  if(!selectedRows.length){alert('Génère d\'abord la sélection.');return}
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rowsForExport(selectedRows)),'Articles_A_Inventorier');
  XLSX.writeFile(wb,'Articles_A_Inventorier.xlsx');
}

function exportAllUpdatedExcel(){
  if(!allRows.length){alert('Génère d\'abord la sélection.');return}
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rowsForExport(allRows)),'Stock_Complet_MAJ');
  XLSX.writeFile(wb,'Stock_Complet_Mis_A_Jour.xlsx');
}
<\/script></body></html>`;

// ── ONGLET ABC ──
document.getElementById('abcFrame').srcdoc = `<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<title>Dashboard ABC - Schneider Electric</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>
<style>
:root{--green:#009639;--dark:#1f2933;--bg:#f4f6f8;--border:#d9dee3;--red:#d9534f;--orange:#f0ad4e;--softgreen:#5cb85c}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:#1f2933}
.header{background:var(--green);color:white;padding:24px 32px}
.header h1{margin:0;font-size:28px}
.header p{margin:8px 0 0;opacity:.9}
.container{padding:24px}
.card{background:white;border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.upload{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:22px}
.controls{display:flex;flex-wrap:wrap;gap:12px;margin-top:15px;align-items:end}
.field label{display:block;font-weight:bold;font-size:13px;margin-bottom:6px}
input,select{padding:10px;border:1px solid var(--border);border-radius:8px;background:white}
button{background:var(--green);color:white;border:0;padding:11px 16px;border-radius:8px;cursor:pointer;font-weight:bold}
button:hover{background:#007a2f}
.secondary{background:var(--dark)}
.hidden{display:none}
.info{margin-top:12px;color:#667085;font-size:14px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:22px}
.kpi{border-left:5px solid var(--green)}
.kpi-label{font-size:13px;color:#667085}
.kpi-value{font-size:28px;font-weight:bold;margin-top:8px}
.kpi-sub{font-size:12px;color:#667085;margin-top:4px}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:22px}
h2{margin:0 0 8px;font-size:20px}
.small{color:#667085;font-size:13px;margin-bottom:12px}
.chart{height:310px}.donut{height:270px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid var(--border);padding:10px;text-align:left}
th{color:#667085;font-size:12px;text-transform:uppercase}
.badge{padding:4px 10px;border-radius:999px;font-weight:bold}
.badge-A{color:var(--red);background:#fdecec}
.badge-B{color:#b87900;background:#fff4db}
.badge-C{color:#2f7d32;background:#e9f7ea}
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.search{width:260px}
</style></head><body>

<div class="header"><h1>Dashboard ABC Inventaire</h1><p>Analyse ABC — Méthode 80/20</p></div>

<div class="container">
<div class="card upload">
  <div>
    <h2>Importer le fichier Excel / CSV</h2>
    <div id="controls" class="controls hidden">
      <div class="field"><label>Feuille</label><select id="sheetSelect"></select></div>
      <div class="field"><label>Colonne Article</label><select id="articleSelect"></select></div>
      <div class="field"><label>Colonne Quantité</label><select id="qtySelect"></select></div>
      <button onclick="calculateABC()">Calculer</button>
      <button class="secondary" onclick="exportExcel()">Télécharger Excel ABC</button>
    </div>
    <div id="info" class="info">Aucun fichier importé.</div>
  </div>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
</div>

<div class="kpis">
  <div class="card kpi"><div class="kpi-label">Articles analysés</div><div id="kpiArticles" class="kpi-value">0</div><div class="kpi-sub">Références uniques</div></div>
  <div class="card kpi"><div class="kpi-label">Quantité totale</div><div id="kpiQty" class="kpi-value">0</div><div class="kpi-sub">Volume total</div></div>
  <div class="card kpi"><div class="kpi-label">À inventorier A</div><div id="kpiInvA" class="kpi-value">0</div><div class="kpi-sub">33% des articles A</div></div>
  <div class="card kpi"><div class="kpi-label">À inventorier B</div><div id="kpiInvB" class="kpi-value">0</div><div class="kpi-sub">16% des articles B</div></div>
  <div class="card kpi"><div class="kpi-label">À inventorier C</div><div id="kpiInvC" class="kpi-value">0</div><div class="kpi-sub">8% des articles C</div></div>
</div>

<div class="grid">
  <div class="card"><h2>Analyse Pareto</h2><div class="small">Top articles par quantité</div><div class="chart"><canvas id="paretoChart"></canvas></div></div>
  <div class="card"><h2>Répartition ABC</h2><div class="small">Nombre d'articles par classe</div><div class="donut"><canvas id="abcChart"></canvas></div></div>
</div>

<div class="card">
  <div class="toolbar">
    <div><h2>Tableau ABC complet</h2><div class="small">Résultat détaillé du calcul</div></div>
    <input id="searchInput" class="search" placeholder="Rechercher article..." oninput="renderTable()">
  </div>
  <table><thead><tr><th>Article</th><th>Quantité totale</th><th>Fréquence</th><th>Fréquence cumulée</th><th>Classe</th></tr></thead><tbody id="fullTable"></tbody></table>
</div>
</div>

<script>
let workbookData=null,currentRows=[],processedResults=[],paretoChart=null,abcChart=null;
const fileInput=document.getElementById('fileInput');
const sheetSelect=document.getElementById('sheetSelect');
const articleSelect=document.getElementById('articleSelect');
const qtySelect=document.getElementById('qtySelect');

fileInput.addEventListener('change',function(e){
  resetData();
  const file=e.target.files[0];
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'){
    const reader=new FileReader();
    reader.onload=evt=>{
      const text=evt.target.result;
      const first=(text.split(/\r?\n/).find(l=>l.trim())||'');
      const delim=first.split(';').length>first.split(',').length?';':',';
      workbookData={CSV:null};
      const Papa=window.Papa;
      Papa.parse(text,{header:true,skipEmptyLines:true,delimiter:delim,complete:r=>{
        workbookData={CSV:r.data};
        setupSheets(['CSV']);loadSheet('CSV');
      }});
    };
    reader.readAsText(file,'utf-8');
  } else {
    const reader=new FileReader();
    reader.onload=evt=>{
      const data=new Uint8Array(evt.target.result);
      const wb=XLSX.read(data,{type:'array'});
      workbookData={};
      wb.SheetNames.forEach(name=>{
        workbookData[name]=XLSX.utils.sheet_to_json(wb.Sheets[name],{defval:'',raw:true}).map(row=>{
          const obj={};Object.keys(row).forEach(k=>obj[String(k).trim()]=row[k]);return obj;
        });
      });
      setupSheets(wb.SheetNames);
      const def=wb.SheetNames.includes('BD')?'BD':wb.SheetNames[0];
      sheetSelect.value=def;loadSheet(def);
    };
    reader.readAsArrayBuffer(file);
  }
  e.target.value='';
});

sheetSelect.addEventListener('change',()=>loadSheet(sheetSelect.value));

function resetData(){
  workbookData=null;currentRows=[];processedResults=[];
  document.getElementById('controls').classList.add('hidden');
  document.getElementById('info').innerHTML='Aucun fichier importé.';
  document.getElementById('fullTable').innerHTML='';
  updateKPIs(0,0,{A:0,B:0,C:0});
  if(paretoChart){paretoChart.destroy();paretoChart=null}
  if(abcChart){abcChart.destroy();abcChart=null}
}

function setupSheets(names){
  sheetSelect.innerHTML='';names.forEach(n=>sheetSelect.add(new Option(n,n)));
  document.getElementById('controls').classList.remove('hidden');
}

function norm(n){return String(n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'')}

function loadSheet(name){
  currentRows=workbookData[name]||[];
  const fields=Object.keys(currentRows[0]||{});
  articleSelect.innerHTML='';qtySelect.innerHTML='';
  fields.forEach(f=>{articleSelect.add(new Option(f,f));qtySelect.add(new Option(f,f))});
  const opts=f=>Array.from(f.options);
  const trySelect=(sel,cands)=>{
    for(const c of cands){const found=opts(sel).find(o=>norm(o.value)===c);if(found){sel.value=found.value;return}}
    for(const c of cands){const found=opts(sel).find(o=>norm(o.value).includes(c));if(found){sel.value=found.value;return}}
  };
  trySelect(articleSelect,['article','articles','ref','reference','sku','item','itemcode']);
  trySelect(qtySelect,['qty','qte','quantite','quantity','qtlivree','qtlivr']);
  document.getElementById('info').innerHTML='Feuille chargée : <b>'+name+'</b> — '+currentRows.length+' lignes.';
}

function parseNum(v){
  if(v===null||v===undefined||v==='')return 0;
  if(typeof v==='number')return v;
  let s=String(v).replace(/\u00A0/g,'').replace(/\s/g,'').trim();
  if(s.includes(',')&&s.includes('.'))s=s.replace(/\./g,'').replace(',','.');
  else s=s.replace(',','.');
  const n=Number(s);return isNaN(n)?0:n;
}

function calculateABC(){
  const artCol=articleSelect.value,qtyCol=qtySelect.value;
  const agg={};
  currentRows.forEach(row=>{
    const art=String(row[artCol]||'').trim();
    const qty=parseNum(row[qtyCol]);
    if(art)agg[art]=(agg[art]||0)+qty;
  });
  const sorted=Object.entries(agg).filter(([a,q])=>a&&q!==0).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,i)=>s+i[1],0);
  let cumul=0;processedResults=[];
  sorted.forEach(([art,qty])=>{
    cumul+=qty;
    const freq=total?qty/total:0;
    const cfreq=total?cumul/total:0;
    const cls=cfreq<0.80?'A':cfreq<0.95?'B':'C';
    processedResults.push({article:art,qty,frequency:freq,cumulativeFrequency:cfreq,cls});
  });
  const counts=countClasses();
  updateKPIs(processedResults.length,total,counts);
  renderTable();renderCharts();
  document.getElementById('info').innerHTML='Calcul terminé : <b>'+processedResults.length+'</b> articles.';
}

function countClasses(){const c={A:0,B:0,C:0};processedResults.forEach(r=>c[r.cls]++);return c}
function updateKPIs(n,q,counts){
  const t={A:Math.ceil(counts.A*0.33),B:Math.ceil(counts.B*0.16),C:Math.ceil(counts.C*0.08)};
  document.getElementById('kpiArticles').innerText=n.toLocaleString('fr-FR');
  document.getElementById('kpiQty').innerText=q.toLocaleString('fr-FR');
  document.getElementById('kpiInvA').innerText=t.A.toLocaleString('fr-FR');
  document.getElementById('kpiInvB').innerText=t.B.toLocaleString('fr-FR');
  document.getElementById('kpiInvC').innerText=t.C.toLocaleString('fr-FR');
}

function renderTable(){
  const search=norm(document.getElementById('searchInput').value||'');
  const filtered=processedResults.filter(r=>norm(r.article).includes(search));
  document.getElementById('fullTable').innerHTML=filtered.map(r=>
    '<tr><td>'+r.article+'</td><td>'+r.qty.toLocaleString('fr-FR')+'</td><td>'+(r.frequency*100).toFixed(2)+'%</td><td>'+(r.cumulativeFrequency*100).toFixed(2)+'%</td><td><span class="badge badge-'+r.cls+'">'+r.cls+'</span></td></tr>'
  ).join('');
}

function renderCharts(){
  const top=processedResults.slice(0,15);
  const counts=countClasses();
  if(paretoChart)paretoChart.destroy();
  if(abcChart)abcChart.destroy();
  paretoChart=new Chart(document.getElementById('paretoChart'),{type:'bar',data:{labels:top.map(r=>r.article),datasets:[{label:'Quantité',data:top.map(r=>r.qty),backgroundColor:'#009639'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  abcChart=new Chart(document.getElementById('abcChart'),{type:'doughnut',data:{labels:['A','B','C'],datasets:[{data:[counts.A,counts.B,counts.C],backgroundColor:['#d9534f','#f0ad4e','#5cb85c']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});
}

function exportExcel(){
  if(!processedResults.length){alert('Lance d\'abord le calcul ABC.');return}
  const counts=countClasses();
  const t={A:Math.ceil(counts.A*0.33),B:Math.ceil(counts.B*0.16),C:Math.ceil(counts.C*0.08)};
  const rows=processedResults.map(r=>({Article:r.article,Quantite_Totale:r.qty,Frequence:(r.frequency*100).toFixed(4)+'%',Frequence_Cumulee:(r.cumulativeFrequency*100).toFixed(4)+'%',Classe:r.cls}));
  const resume=[{Classe:'A',Articles:counts.A,Pct:'33%',A_Inventorier:t.A},{Classe:'B',Articles:counts.B,Pct:'16%',A_Inventorier:t.B},{Classe:'C',Articles:counts.C,Pct:'8%',A_Inventorier:t.C}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'ABC');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(resume),'Synthese');
  XLSX.writeFile(wb,'rapport_abc_inventaire.xlsx');
}
<\/script></body></html>`;
</script>
</body>
</html>
