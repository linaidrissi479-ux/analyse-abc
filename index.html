<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Inventaire + ABC</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8}

.tabs{
  display:flex;
  background:#009639;
}

.tab{
  padding:15px 25px;
  cursor:pointer;
  color:white;
  font-weight:bold;
}

.tab.active{
  background:#007a2f;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

iframe{
  width:100%;
  height:calc(100vh - 60px);
  border:none;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab(0,this)">Inventaire</div>
  <div class="tab" onclick="showTab(1,this)">Analyse ABC</div>
</div>

<div class="page active">
  <iframe src="inventaire.html"></iframe>
</div>

<div class="page">
  <iframe src="abc.html"></iframe>
</div>

<script>
function showTab(index,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  el.classList.add('active');
  document.querySelectorAll('.page')[index].classList.add('active');
}
</script>

</body>
</html>
