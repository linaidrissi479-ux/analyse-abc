<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Schneider Electric - Analyse ABC Officielle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --schneider-green: #009639; --border-color: #d1d1d1; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .header { background-color: var(--schneider-green); color: white; padding: 15px; font-weight: bold; margin-bottom: 20px; }
        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; }
        .tab { padding: 10px 25px; cursor: pointer; background: #e0e0e0; border: 1px solid var(--border-color); border-bottom: none; margin-right: 5px; font-weight: bold; }
        .tab.active { background: white; color: var(--schneider-green); border-top: 3px solid var(--schneider-green); }
        .card { background: white; padding: 20px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .config-section { background: #f9f9f9; padding: 15px; border: 1px solid var(--schneider-green); display: flex; gap: 20px; align-items: flex-end; }
        .kpi-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .kpi-card { flex: 1; border: 1px solid var(--border-color); padding: 15px; text-align: center; background: white; }
        .kpi-value { font-size: 24px; font-weight: bold; color: #cc0000; display: block; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid var(--border-color); padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; text-transform: uppercase; }
        button { padding: 10px 20px; background-color: var(--schneider-green); color: white; border: none; cursor: pointer; font-weight: bold; }
        .cl-A { color: #cc0000; font-weight: bold; }
        .cl-B { color: #ff9900; font-weight: bold; }
        .cl-C { color: #008000; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">SCHNEIDER ELECTRIC - ANALYSEUR D'INVENTAIRE TOURNANT</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('tab1')">ANALYSE ABC</div>
    <div class="tab" onclick="showTab('tab2')">QUOTAS DE COMPTAGE</div>
</div>

<div id="tab1" class="content">
    <div class="card">
        <label>Sélectionner le fichier CSV : </label>
        <input type="file" id="csvInput" accept=".csv">
        <div id="mappingSection" style="display:none; margin-top:20px;">
            <div class="config-section">
                <div><label>Colonne Article</label><br><select id="mapArt"></select></div>
                <div><label>Colonne Quantité</label><br><select id="mapQty"></select></div>
                <button onclick="processABC()">Exécuter l'analyse</button>
            </div>
        </div>
    </div>
    <div id="resultsWrapper" class="card" style="display:none">
        <table id="tableABC">
            <thead>
                <tr>
                    <th>Article</th>
                    <th>Qté livr.</th>
                    <th>Cumul</th>
                    <th>% Cumulé</th>
                    <th>Classe</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="tab2" class="content" style="display:none">
    <div class="card">
        <div class="kpi-row">
            <div class="kpi-card">CLASSE A (33%) <span id="valA" class="kpi-value">0</span></div>
            <div class="kpi-card">CLASSE B (16%) <span id="valB" class="kpi-value" style="color:#ff9900">0</span></div>
            <div class="kpi-card">CLASSE C (8%) <span id="valC" class="kpi-value" style="color:#008000">0</span></div>
        </div>
        <button onclick="exportToExcel()" style="background:#333">Exporter le rapport complet avec % (XLSX)</button>
    </div>
</div>

<script>
    let rawData = [];
    let finalResults = [];

    function showTab(id) {
        document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    document.getElementById('csvInput').onchange = function(e) {
        rawData = []; finalResults = [];
        document.getElementById('resultsWrapper').style.display = 'none';
        Papa.parse(e.target.files[0], {
            header: true, skipEmptyLines: true,
            complete: function(r) {
                rawData = r.data;
                const selA = document.getElementById('mapArt');
                const selQ = document.getElementById('mapQty');
                selA.innerHTML = ''; selQ.innerHTML = '';
                r.meta.fields.forEach(c => { selA.add(new Option(c, c)); selQ.add(new Option(c, c)); });
                document.getElementById('mappingSection').style.display = 'block';
            }
        });
    };

    function processABC() {
        const aCol = document.getElementById('mapArt').value;
        const qCol = document.getElementById('mapQty').value;
        let aggregate = {};
        rawData.forEach(row => {
            let ref = row[aCol] ? row[aCol].trim() : '';
            let val = parseFloat(String(row[qCol]).replace(/\s/g, '').replace(',', '.')) || 0;
            if(ref) aggregate[ref] = (aggregate[ref] || 0) + val;
        });

        let sorted = Object.entries(aggregate).sort((a, b) => b[1] - a[1]);
        let total = sorted.reduce((sum, item) => sum + item[1], 0);
        let cumul = 0; let summary = { A: 0, B: 0, C: 0 };
        finalResults = [];

        sorted.forEach(([art, qte]) => {
            cumul += qte;
            let percentVal = (cumul / total) * 100;
            let cls = percentVal <= 80.0001 ? 'A' : (percentVal <= 95.0001 ? 'B' : 'C');
            summary[cls]++;
            finalResults.push({ 
                'Article': art, 'Qté livr.': qte, 'Cumul': cumul, '% Cumulé': percentVal.toFixed(2) + '%', 'Classe': cls 
            });
        });

        const tbody = document.querySelector('#tableABC tbody');
        tbody.innerHTML = finalResults.map(r => `
            <tr><td>${r['Article']}</td><td>${r['Qté livr.']}</td><td>${r['Cumul']}</td><td>${r['% Cumulé']}</td><td class="cl-${r['Classe']}">${r['Classe']}</td></tr>
        `).join('');
        document.getElementById('resultsWrapper').style.display = 'block';
        document.getElementById('valA').innerText = Math.ceil(summary.A * 0.33) + " articles";
        document.getElementById('valB').innerText = Math.ceil(summary.B * 0.16) + " articles";
        document.getElementById('valC').innerText = Math.ceil(summary.C * 0.08) + " articles";
    }

    function exportToExcel() {
        if (finalResults.length === 0) return alert("Veuillez d'abord lancer l'analyse.");
        const ws = XLSX.utils.json_to_sheet(finalResults);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Rapport_Complet");
        XLSX.writeFile(wb, "Inventaire_Schneider_Avec_Pourcentages.xlsx");
    }
</script>
</body>
</html>
